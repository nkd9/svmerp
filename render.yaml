services:
  - type: web
    name: eduflow-erp
    plan: free
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set this manually in the Render dashboard!
      - key: JWT_SECRET
        generateValue: true
